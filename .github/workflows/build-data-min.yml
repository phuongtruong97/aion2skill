name: Tự động lọc data game (build data_min)

# Chạy khi có push vào main mà thay đổi nằm trong data/, hoặc khi bấm chạy tay
on:
  push:
    branches: [main]
    paths:
      - "data/**"
  workflow_dispatch: {}

# Cho phép Action commit ngược lại vào repo
permissions:
  contents: write

jobs:
  build-data-min:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Cần full history để commit/push lại đúng cách
          fetch-depth: 0

      - name: Bỏ qua nếu commit này là do bot tự tạo (tránh lặp vô hạn)
        id: skip_check
        run: |
          LAST_MSG=$(git log -1 --pretty=%B)
          if [[ "$LAST_MSG" == *"[skip-data-build]"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.skip_check.outputs.skip == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Chạy script lọc data (build/build_all.py)
        if: steps.skip_check.outputs.skip == 'false'
        run: python3 build/build_all.py

      - name: Commit và push data_min/ nếu có thay đổi
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data_min/
          if git diff --cached --quiet; then
            echo "Không có thay đổi nào ở data_min/, bỏ qua commit."
          else
            git commit -m "chore: tự động build data_min từ patch mới [skip-data-build]"
            git push
          fi
