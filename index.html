<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AION2 Skill Planner</title>
    
    <link rel="icon" type="image/png" href="icons/logo.png">
    
    <script src="xlsx.full.min.js"></script>
    <script>if (!window.XLSX) document.write('<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"><\/script>');</script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ====== IO PANEL ====== -->
    <div class="io-panel">
        <div class="nav-tabs">
            <button class="nav-btn active" id="btn-tab-search" onclick="switchTab('search')">
                <div class="nav-btn-icon" style="background-image: url('./icons/skill.png');"></div>
                Skill
            </button>
            <button class="nav-btn" id="btn-tab-compare" onclick="clickPatchNote()">
                Patch Note
            </button>
        </div>

        <div class="loading-container">
            <div class="spinner" id="ui-spinner"></div>
            <div id="status">Checking Environment...</div>
        </div>

        <div style="display:flex; align-items:center; gap:12px;">
            <a href="https://discord.gg/neotw" target="_blank" class="discord-link">
                <img src="https://static.vecteezy.com/system/resources/previews/018/930/604/large_2x/discord-logo-discord-icon-transparent-free-png.png" alt="Discord">
                <span>Discord</span>
            </a>
            <span style="color:#444; font-size:12px; font-weight:600; white-space:nowrap; font-family:monospace;">#Yoha555</span>
            <select id="ui-lang" class="lang-select" onchange="changeLanguage()">
                <option value="vi">Tiếng Việt</option>
                <option value="en" selected>English</option>
            </select>
        </div>
    </div>

    <!-- ====== CLASS BAR STRIP (dưới io-panel, full width) ====== -->
    <div class="class-bar-strip">
        <div class="class-icon-bar" id="ui-class-bar"></div>
    </div>

    <!-- ====== SEARCH VIEW ====== -->
    <div class="main-content" id="view-search">

        <!-- Skill Detail Tooltip -->
        <div class="tooltip-box" id="ui-tooltip">
            <div class="close-overlay-btn" onclick="closeMobileOverlay()">✕</div>

            <div class="header">
                <div class="skill-icon" id="ui-icon"></div>
                <div class="skill-info">
                    <div class="variant-nav" id="ui-variant-nav" style="display:none;"></div>
                    <h2 class="skill-name" id="ui-name">Skill Name</h2>
                    <div class="skill-meta" id="ui-meta">
                        <div class="meta-item">
                            <span class="meta-label">MP</span>
                            <span class="meta-val" id="ui-mp">--</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">CD</span>
                            <span class="meta-val" id="ui-cd">--</span>
                        </div>
                    </div>
                    <div class="skill-spec-tag" id="ui-spec-tag"></div>
                </div>
            </div>

            <div class="level-control">
                <span class="lv-label">1</span>
                <input type="range" id="lv-slider" min="1" max="30" value="1" oninput="updateLevel(this.value)">
                <span class="lv-label">30</span>
                <span class="level-val" id="lv-display">1</span>
            </div>

            <div class="desc-area" id="ui-desc">Select a skill to view details.</div>

            <div class="spec-container" id="ui-spec-container">
                <div class="spec-header">
                    <span id="label-spec">SPECIALIZATION</span>
                    <span id="ui-spec-count" style="color:#555; font-size:11px;">0/3</span>
                </div>
                <div class="rune-slots" id="ui-slots"></div>
                <div class="rune-pool" id="ui-runes"></div>
            </div>
        </div>

        <!-- Skill List Panel -->
        <div class="list-panel">
            <div class="scroll-area">
                <div class="category-header" id="cat-active">Active</div>
                <div class="skill-grid" id="grid-active"></div>
                <div class="category-header" id="cat-stigma">Stigma</div>
                <div class="skill-grid" id="grid-stigma"></div>
                <div class="category-header" id="cat-passive">Passive</div>
                <div class="skill-grid" id="grid-passive"></div>
            </div>
        </div>
    </div>

    <!-- ====== COMPARE VIEW ====== -->
    <div id="view-compare" style="display:none; width:95%; max-width:1400px; margin-top:20px;">
        <div style="width:95%; max-width:1400px; margin:20px auto;">

            <div class="compare-controls">
                <div>
                    <label>Patch trước</label>
                    <select id="ver-select-a" class="c-select"></select>
                </div>
                <div>
                    <label>Patch mới</label>
                    <select id="ver-select-b" class="c-select"></select>
                </div>
                <button class="reload-btn" onclick="runCompareProcess()">↺ Reload</button>
            </div>

            <div id="compare-progress-container" style="display:none; margin-bottom:18px;">
                <div style="color:#666; font-size:11px; margin-bottom:8px; display:flex; justify-content:space-between; text-transform:uppercase; letter-spacing:0.5px;">
                    <span id="progress-text">Đang chuẩn bị...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div style="width:100%; height:4px; background:#1e2029; border-radius:2px; overflow:hidden;">
                    <div id="progress-bar" style="width:0%; height:100%; background:var(--accent); transition:width 0.2s;"></div>
                </div>
            </div>

            <div id="compare-results-area" style="display:none; flex-direction:column; gap:10px; margin-bottom:50px;">
                <div id="diff-grouped-list"></div>
            </div>
        </div>
    </div>

    <!-- ====== COMPARE MODAL ====== -->
    <div id="compare-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-close" onclick="closeCompareModal()">✕</div>

            <div class="modal-header-row">
                <div id="modal-icon" class="skill-icon" style="width:52px; height:52px; border-color:#555;"></div>
                <div>
                    <h2 id="modal-skill-name" style="margin:0; color:var(--accent); font-size:18px; font-weight:700;">Skill Name</h2>
                    <div id="modal-skill-id" style="font-size:11px; color:#444; margin-top:2px;">ID: 0000</div>
                </div>
            </div>

            <div class="compare-layout">
                <div class="compare-col">
                    <div class="compare-header" id="modal-ver-a">PATCH OLD</div>
                    <div class="compare-body" id="modal-content-a">Loading...</div>
                </div>
                <div class="compare-mid">➜</div>
                <div class="compare-col">
                    <div class="compare-header" id="modal-ver-b">PATCH NEW</div>
                    <div class="compare-body" id="modal-content-b">Loading...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">Tạo bởi Yoha</div>

    <script src="script.js"></script>
    <script src="compare.js"></script>

    <script>
        function clickPatchNote() {
            switchTab('compare');
            setTimeout(() => {
                if (typeof runCompareProcess === 'function') runCompareProcess();
            }, 300);
        }
    </script>
</body>
</html>
